<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>blivedm Monitor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-row">
        <span class="menu-icon" aria-hidden="true">☰</span>
        <div>
          <div class="breadcrumbs">首页 / B站直播助手 / 直播监控</div>
          <h1>B站直播监控</h1>
        </div>
      </div>
      <div class="topbar-actions">
        <span id="statusText">加载中</span>
        <button id="clientConfigBtn" class="secondary" type="button">采集配置</button>
        <button id="refreshBtn" type="button">刷新</button>
      </div>
    </header>

    <main class="monitor-layout">
      <aside class="monitor-sidebar">
        <section class="panel room-panel">
          <div class="section-title">
            <div>
              <h2>主播列表</h2>
              <p>左侧选择房间，中间查看消息记录</p>
            </div>
          </div>

          <form id="roomForm" class="room-form">
            <input id="roomInput" name="room" autocomplete="off" placeholder="直播间 URL 或房间号" required />
            <input id="remarkInput" name="remark" autocomplete="off" placeholder="备注" />
            <button type="submit">添加</button>
          </form>

          <div id="roomsBody" class="room-list"></div>
        </section>

      </aside>

      <section class="panel event-panel">
        <div class="event-toolbar">
          <div>
            <h2>房间消息记录</h2>
            <p id="streamSummary">等待数据刷新</p>
          </div>
          <button class="secondary details-button" type="button">Details</button>
        </div>
        <div class="event-filter-bar">
          <input id="eventRoomFilter" inputmode="numeric" placeholder="房间号" />
          <select id="eventTypeFilter">
            <option value="">全部事件</option>
            <option value="danmaku">弹幕</option>
            <option value="enter_room">进房</option>
            <option value="follow">关注</option>
            <option value="gift">礼物</option>
            <option value="guard">上舰</option>
            <option value="super_chat">醒目留言</option>
          </select>
        </div>
        <div id="eventsList" class="events-list"></div>
      </section>

      <aside class="analytics-column">
        <section class="panel analytics-panel">
          <div class="analytics-head">
            <div>
              <h2>统计数据</h2>
              <p>按时间、用户、主播和场次维度聚合</p>
            </div>
            <button id="analyticsRefreshBtn" type="button">刷新</button>
          </div>
          <div id="analyticsSummary" class="analytics-summary"></div>
          <div id="analyticsCharts" class="analytics-charts"></div>
        </section>
      </aside>
    </main>

    <div id="clientConfigModal" class="modal-overlay" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="clientConfigTitle">
        <div class="modal-head">
          <div>
            <h2 id="clientConfigTitle">采集客户端配置</h2>
            <p>按 client_id 独立维护 Cookie、启用状态和容量</p>
          </div>
          <button id="clientConfigCloseBtn" class="secondary" type="button">关闭</button>
        </div>

        <form id="collectorClientForm" class="client-form">
          <input id="collectorClientIdInput" name="client_id" autocomplete="off" placeholder="client_id" required />
          <input id="collectorClientRemarkInput" name="remark" autocomplete="off" placeholder="备注" />
          <input
            id="collectorMaxRoomsInput"
            name="max_active_rooms"
            type="number"
            min="1"
            max="500"
            step="1"
            value="50"
            placeholder="最大房间数"
          />
          <input
            id="collectorSessdataInput"
            name="bili_sessdata"
            type="password"
            autocomplete="off"
            placeholder="SESSDATA 或 Cookie 片段，留空只更新备注"
          />
          <label class="checkbox-field">
            <input id="collectorEnabledInput" name="enabled" type="checkbox" checked />
            启用
          </label>
          <button type="submit">保存</button>
        </form>

        <div class="table-wrap client-table-wrap">
          <table>
            <thead>
              <tr>
                <th>客户端</th>
                <th>状态</th>
                <th>最大房间数</th>
                <th>SESSDATA</th>
                <th>最近拉取任务</th>
                <th>备注</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="collectorClientsBody"></tbody>
          </table>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>
    <script src="/static/app.js"></script>
  </body>
</html>
